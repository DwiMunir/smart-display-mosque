services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: mosque-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mosque}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password required}
      POSTGRES_DB: ${POSTGRES_DB:-mosque_display}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mosque} -d ${POSTGRES_DB:-mosque_display}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mosque-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:?Clerk publishable key required}
        - NEXT_PUBLIC_CLERK_SIGN_IN_URL=${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
        - NEXT_PUBLIC_CLERK_SIGN_UP_URL=${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
        - NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=${NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL:-/dashboard}
        - NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=${NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL:-/select-organization}
        - NEXT_PUBLIC_ALADHAN_API=${NEXT_PUBLIC_ALADHAN_API:-https://api.aladhan.com/v1}
    container_name: mosque-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mosque}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mosque_display}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:?Clerk secret key required}
      - CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - mosque-network
    expose:
      - "3000"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: mosque-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - mosque-network

volumes:
  postgres_data:

networks:
  mosque-network:
    driver: bridge
